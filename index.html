<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alcance+</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <div class="loader"></div>
  <p>Carregando Alcance+</p>
</div>

<!-- HEADER -->
<header>
  <h2>Alcance+</h2>
  <button id="btnComecar">Começar</button>
</header>

<!-- HOME -->
<section id="home" class="tela">
  <h1>Sua empresa mais visível</h1>
  <p>Divulgue produtos e alcance mais clientes</p>
</section>

<!-- PLANOS -->
<section id="planos" class="tela hidden">
  <h2>Escolha um plano</h2>

  <div class="card">
    <h3>Plano Grátis</h3>
    <p>1 produto</p>
    <button onclick="escolherPlano('gratis')">Selecionar</button>
  </div>

  <div class="card destaque">
    <h3>Plano Pro</h3>
    <p>Produtos ilimitados</p>
    <button onclick="escolherPlano('pro')">Selecionar</button>
  </div>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="tela hidden">
  <h2>Painel da Empresa</h2>

  <input id="nome" placeholder="Nome do produto">
  <input id="desc" placeholder="Descrição">
  <button id="btnPostar">Postar</button>

  <div id="lista"></div>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h2>Cadastro</h2>
    <p>Simulação de cadastro</p>
    <button id="btnContinuar">Continuar</button>
  </div>
</div>

<!-- SCRIPT SEMPRE NO FINAL -->
<script src="script.js"></script>

</body>
</html>
